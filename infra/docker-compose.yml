# Infra de desenvolvimento local. Em produção (VPS Hostinger) ver docs/spec/01.
# Nenhum serviço expõe porta além do necessário ao dev; em prod só o proxy é público.
services:
  postgres:
    image: postgres:16-alpine
    container_name: vetapp_postgres
    environment:
      POSTGRES_DB: vetapp
      POSTGRES_USER: vetapp_admin
      POSTGRES_PASSWORD: admin_password
    ports:
      - '5432:5432'
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U vetapp_admin -d vetapp']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: vetapp_redis
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6379:6379'
    volumes:
      - ./.data/redis:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

  # S3-compatível para DEV (em prod usamos Cloudflare R2, externo).
  minio:
    image: minio/minio:latest
    container_name: vetapp_minio
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - ./.data/minio:/data
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
